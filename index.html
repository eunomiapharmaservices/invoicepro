function reducer(state,{type,payload}){
  switch(type){
    case"SET":return payload;
    case"ADD_INVOICE":return{...state,invoices:[payload,...state.invoices]};
    case"UPD_INVOICE":return{...state,invoices:state.invoices.map(i=>i.id===payload.id?payload:i)};
    case"DEL_INVOICE":return{...state,invoices:state.invoices.filter(i=>i.id!==payload)};
    case"ADD_BILL":return{...state,bills:[payload,...state.bills]};
    case"UPD_BILL":return{...state,bills:state.bills.map(b=>b.id===payload.id?payload:b)};
    case"DEL_BILL":return{...state,bills:state.bills.filter(b=>b.id!==payload)};
    case"ADD_SOW":return{...state,sows:[payload,...state.sows]};
    case"UPD_SOW":return{...state,sows:state.sows.map(s=>s.id===payload.id?payload:s)};
    case"DEL_SOW":return{...state,sows:state.sows.filter(s=>s.id!==payload)};
    case"ADD_DEL":return{...state,deliverables:[payload,...state.deliverables]};
    case"UPD_DEL":return{...state,deliverables:state.deliverables.map(d=>d.id===payload.id?payload:d)};
    case"DEL_DEL":return{...state,deliverables:state.deliverables.filter(d=>d.id!==payload)};
    default:return state;
  }
}
